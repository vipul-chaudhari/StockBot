name: Daily NSE Stock Advisor

on:
  schedule:
    # Every 5 minutes from 03:30 UTC to 15:30 UTC (9:00 AM to 9:00 PM IST)
    - cron: '30-59/5 3 * * 1-5'
    - cron: '*/5 4-14 * * 1-5'
    - cron: '0-30/5 15 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r nse_stock_advisor/requirements.txt

    - name: Run Stock Analysis
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python nse_stock_advisor/stock_recommender.py
